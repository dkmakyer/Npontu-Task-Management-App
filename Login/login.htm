<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="content">
                <!-- Left Section -->
                <div class="left-section">
                    <h1>Sign In</h1>
                    
                    <!-- Username Input -->
                    <div class="input-group">
                        <img src="https://dashboard.codeparrot.ai/api/image/Z8jW1LwkNXOiaV83/mdi-user.png" class="input-icon">
                        <input type="text" id="username" placeholder="Enter Username">
                    </div>

                    <!-- Password Input -->
                    <div class="input-group">
                        <img src="https://dashboard.codeparrot.ai/api/image/Z8jW1LwkNXOiaV83/mdi-pass.png" class="input-icon">
                        <input type="password" id="password" placeholder="Enter Password">
                    </div>

                    <!-- Remember Me -->
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember Me</label>
                    </div>

                    <!-- Login Button -->
                    <button class="login-btn" id="loginBtn">Login</button>

                    <!-- Social Login -->
                    <div class="social-login">
                        <p>Or, Login with</p>
                        <div class="social-icons">
                            <a href="https://www.facebook.com" target="_blank">
                                <img src="https://static.xx.fbcdn.net/rsrc.php/v3/yG/r/pENh3y_2Pnw.png" alt="Facebook">
                            </a>
                            <a href="https://www.google.com" target="_blank">
                                <img src="https://banner2.cleanpng.com/20190228/qby/kisspng-google-logo-google-account-g-suite-google-images-g-icon-archives-search-png-1713904157115.webp" alt="Google">
                            </a>
                            <a href="https://www.twitter.com" target="_blank">
                                <img src="https://img.freepik.com/premium-vector/new-twitter-logo-x-2023-twitter-x-logo-vector-download_691560-10808.jpg?semt=ais_hybrid" alt="Twitter">
                            </a>
                        </div>
                    </div>

                    <!-- Create Account Link -->
                    <p class="signup-text">
                        Don't have an account? <a href="#">Create One</a>
                    </p>
                </div>

                <!-- Right Section - Image -->
                <div class="right-section">
                    <img src="https://dashboard.codeparrot.ai/api/image/Z8jW1LwkNXOiaV83/ach-3-1.png">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
