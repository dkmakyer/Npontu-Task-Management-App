<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Dashboard - Edit Task</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex flex-col h-screen">
    <!-- Header -->
    <header class="flex justify-between items-center shadow-md bg-gray-50 fixed w-full p-4 z-10">
      <div class="flex items-center">
      </div>
      <div class="flex items-center">
        <div class="bg-red-400 p-2 rounded h-[2rem] flex items-center justify-center mr-4 cursor-pointer" id="notificationButton">
          <i class="fas fa-bell text-white text-xl"></i>
        </div>
        <a href="../Settings/Settings.html">
          <div class="bg-red-400 p-2 rounded h-[2rem] flex items-center justify-center mr-4">
            <i class="fas fa-cog text-white text-xl"></i>
          </div>
        </a>
        <p class="text-black flex flex-col items-center">
          Tuesday <span class="text-[12px] text-blue-400">20/06/2023</span>
        </p>
      </div>
    </header>

    <!-- Notification Pop-up -->
    <div class="hidden fixed inset-0 bg-gray-800 bg-opacity-50 flex items-center justify-center z-20" id="notificationPopup">
      <div class="bg-white rounded-lg shadow-lg w-full max-w-md relative">
        <div class="p-4 border-b border-gray-200 flex justify-between items-center">
          <h2 class="text-xl font-semibold">Notifications</h2>
          <button class="text-gray-500 hover:text-gray-700" id="closePopup">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="p-4 space-y-4">
          <!-- Notification Items -->
          <!-- Repeat this block for each notification -->
          <div class="flex items-center space-x-4">
            <div class="flex-shrink-0">
              <img alt="Thumbnail of Juice Slider" class="w-12 h-12 rounded" height="50" src="https://storage.googleapis.com/a1aa/image/t0n560aaRmjPTxTzIw1sTLi0mcmTR9T18TaeGowluao.jpg" width="50">
            </div>
            <div class="flex-1">
              <p class="text-gray-700">
                Complete the entire design for
                <span class="font-semibold">Juice Slider</span>.
              </p>
              <p class="text-red-500">
                Priority: <span class="font-semibold">High</span>
              </p>
              <p class="text-gray-400">2h</p>
            </div>
          </div>
          <!-- End of Notification Item -->
        </div>
      </div>
    </div>

    <div class="flex flex-1 pt-16">
      <!-- Sidebar -->
      <aside class="w-72 bg-black text-white fixed h-full top-16 left-0 py-8 px-6">
        <div class="flex flex-col items-center">
          <div class="relative w-24 h-24 mb-4">
            <img src="https://storage.googleapis.com/a1aa/image/rUXZDbcIOfUN6UNKIx9JV_yYtjGio_UQcHrU_9LlOOg.jpg"
                 alt="User Profile" class="rounded-full border-4 border-gray-200 w-full h-full">
          </div>
          <p class="text-lg font-semibold">Amanuel</p>
          <p class="text-sm text-gray-400">amanuel@gmail.com</p>
        </div>

        <!-- Navigation -->
        <nav class="mt-8 space-y-3">
          <a href="../land/land.html" class="flex items-center text-gray-400 hover:text-red-400">
            <i class="fas fa-tachometer-alt mr-3"></i> Dashboard
          </a>
          <a href="../Vital Task/vitals-tm.html" class="flex items-center text-gray-400 hover:text-red-400">
            <i class="fas fa-tasks mr-3"></i> Vital Task
          </a>
          <a href="../My Task/My Task.html" class="flex items-center text-gray-400 hover:text-red-400">
            <i class="fas fa-list mr-3"></i> My Task
          </a>
          <a href="../Category/task-categories.html" class="flex items-center text-gray-400 hover:text-red-400">
            <i class="fas fa-tags mr-3"></i> Task Categories
          </a>
          <a href="../Settings/Settings.html" class="flex items-center text-gray-400 hover:text-red-400">
            <i class="fas fa-cog mr-3"></i> Settings
          </a>
          <a href="#" class="flex items-center text-gray-400 hover:text-red-400">
            <i class="fas fa-question-circle mr-3"></i> Help
          </a>
        </nav>

        <!-- Logout -->
        <div class="mt-8">
          <a href="#" class="flex items-center text-gray-400 hover:text-red-400">
            <i class="fas fa-sign-out-alt mr-3"></i> Logout
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 p-6 ml-72">
        <div class="bg-white p-8 rounded shadow-lg max-w-3xl mx-auto">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">
              Edit Task
            </h2>
            <a class="text-blue-500" href="../Vital Task/vitals-tm.html">
              Go Back
            </a>
          </div>
          <form>
            <div class="mb-4">
              <label class="block text-gray-700" for="title">
                Title
              </label>
              <input class="border rounded w-full p-2" id="title" type="text">
            </div>
            <div class="mb-4">
              <label class="block text-gray-700" for="date">
                Date
              </label>
              <input class="border rounded w-full p-2" id="date" type="date">
            </div>
            <div class="mb-4">
              <label class="block text-gray-700">
                Priority
              </label>
              <div class="flex items-center">
                <input class="mr-2" id="extreme" name="priority" type="radio">
                <label class="mr-4" for="extreme">
                  Extreme
                </label>
                <input class="mr-2" id="moderate" name="priority" type="radio">
                <label class="mr-4" for="moderate">
                  Moderate
                </label>
                <input class="mr-2" id="low" name="priority" type="radio">
                <label for="low">
                  Low
                </label>
              </div>
            </div>
            <div class="mb-4">
              <label class="block text-gray-700" for="description">
                Task Description
              </label>
              <textarea class="border rounded w-full p-2 h-32" id="description"></textarea>
            </div>
            <div class="mb-4">
              <label class="block text-gray-700">
                Upload Image
              </label>
              <div class="border-dashed border-2 border-gray-300 rounded p-4 text-center">
                <img alt="Upload image placeholder" class="mx-auto mb-4" height="100" src="https://placehold.co/100x100" width="100">
                <p>
                  Drag & Drop files here
                </p>
                <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded mt-2">
                  Browse
                </button>
              </div>
            </div>
            <div class="text-right">
              <button class="bg-orange-500 text-white px-4 py-2 rounded">
                Done
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="task-categories.js"></script>
</body>
</html>
