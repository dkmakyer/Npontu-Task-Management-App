<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="bg-black text-white w-1/4 p-4 flex flex-col justify-between">
            <div>
                <div class="text-2xl font-bold mb-8">
                    <span class="text-red-500">To-</span>Do
                </div>
                <div class="mb-4">
                    <input type="checkbox" id="my-task" class="mr-2">
                    <label for="my-task" class="cursor-pointer">My Task</label>
                </div>
                <div class="mb-4">
                    <span>Settings</span>
                </div>
                <div class="bg-white text-black p-2 rounded mb-4">
                    <span>Help</span>
                </div>
            </div>
            <div>
                <span>Logout</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-6">
            <!-- Header -->
            <div class="flex justify-end items-center mb-8">
                <div class="text-sm">
                    <span>Tuesday</span><br>
                    <span>20/06/2023</span>
                </div>
            </div>

            <!-- Help Section -->
            <div class="bg-white p-6 rounded shadow">
                <div class="space-y-4">
                    <a href="https://example.com/getting-started" class="block bg-red-400 text-white p-4 rounded text-center cursor-pointer">Getting Started</a>
                    <a href="https://example.com/community-support" class="block bg-red-400 text-white p-4 rounded text-center cursor-pointer">Community Support And Resources</a>
                    <a href="https://example.com/troubleshooting-faqs" class="block bg-red-400 text-white p-4 rounded text-center cursor-pointer">Troubleshooting & FAQs</a>
                    <a href="https://example.com/user-feedback" class="block bg-red-400 text-white p-4 rounded text-center cursor-pointer">User Feedback</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
