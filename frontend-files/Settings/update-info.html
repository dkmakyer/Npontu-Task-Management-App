<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   To-Do App
  </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex flex-col h-screen">
    <!-- Header -->
    <header class="flex justify-between items-center shadow-md bg-gray-50 fixed w-full p-4 z-10">
      <div class="flex items-center">
      </div>
      <div class="flex items-center">
          <div class="bg-red-400 p-2 rounded h-[2rem] flex items-center justify-center mr-4">
              <i class="fas fa-bell text-white text-xl"></i>
          </div>
          <a href="../Settings/Settings.html">
            <div class="bg-red-400 p-2 rounded h-[2rem] flex items-center justify-center mr-4">
              <i class="fas fa-cog text-white text-xl"></i>
            </div>
          </a>
          <p class="text-black flex flex-col items-center">
              Tuesday <span class="text-[12px] text-blue-400">20/06/2023</span>
          </p>
      </div>
    </header>
    
    <div class="flex flex-1 pt-16">
      <!-- Sidebar -->
      <aside class="w-72 bg-black text-white fixed h-full top-16 left-0 py-8 px-6">
          <div class="flex flex-col items-center">
              <div class="relative w-24 h-24 mb-4">
                  <img src="https://storage.googleapis.com/a1aa/image/rUXZDbcIOfUN6UNKIx9JV_yYtjGio_UQcHrU_9LlOOg.jpg"
                       alt="User Profile" class="rounded-full border-4 border-gray-200 w-full h-full">
              </div>
              <p class="text-lg font-semibold">Amanuel</p>
              <p class="text-sm text-gray-400">amanuel@gmail.com</p>
          </div>

          <!-- Navigation -->
          <nav class="mt-8 space-y-3">
              <a href="../land/land.html" class="flex items-center text-gray-400 hover:text-red-400">
                  <i class="fas fa-tachometer-alt mr-3"></i> Dashboard
              </a>
              <a href="../Vital Task/vitals-tm.html" class="flex items-center text-gray-400 hover:text-red-400">
                  <i class="fas fa-tasks mr-3"></i> Vital Task
              </a>
              <a href="../My Task/My Task.html" class="flex items-center text-gray-400 hover:text-red-400">
                  <i class="fas fa-list mr-3"></i> My Task
              </a>
              <a href="../Category/task-categories.html" class="flex items-center text-gray-400 hover:text-red-400">
                  <i class="fas fa-tags mr-3"></i> Task Categories
              </a>
              <a href="../Settings/Settings.html" class="flex items-center text-gray-400 hover:text-red-400">
                  <i class="fas fa-cog mr-3"></i> Settings
              </a>
              <a href="#" class="flex items-center text-gray-400 hover:text-red-400">
                  <i class="fas fa-question-circle mr-3"></i> Help
              </a>
          </nav>

          <!-- Logout -->
          <div class="mt-8">
              <a href="#" class="flex items-center text-gray-400 hover:text-red-400">
                  <i class="fas fa-sign-out-alt mr-3"></i> Logout
              </a>
          </div>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 p-6 ml-72">
        <!-- Account Information -->
        <div class="bg-white p-6 rounded shadow">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">
              Account Information
            </h2>
            <a class="text-blue-500" href="../Settings/view-info.html">
              Go Back
            </a>
          </div>
          <div class="flex items-center mb-6">
            <img alt="User profile picture" class="rounded-full w-12 h-12 mr-4" height="50" src="https://placehold.co/50x50" width="50"/>
            <div>
              <p class="font-semibold">
                amanuel
              </p>
              <p class="text-sm">
                amanuel@gmail.com
              </p>
            </div>
          </div>
          <form>
            <div class="grid grid-cols-1 gap-4">
              <input class="border rounded p-2" placeholder="First Name" type="text"/>
              <input class="border rounded p-2" placeholder="Last Name" type="text"/>
              <input class="border rounded p-2" placeholder="Email Address" type="email"/>
              <input class="border rounded p-2" placeholder="Contact Number" type="text"/>
            </div>
            <div class="flex justify-end mt-6">
              <button class="bg-red-500 text-white px-4 py-2 rounded mr-2" type="submit">
                Save Changes
              </button>
              <button class="bg-gray-300 text-black px-4 py-2 rounded" type="button">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
