<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>To-Do App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="bg-black text-white w-64 p-6 flex flex-col justify-between fixed h-full">
      <div>
        <div class="flex items-center mb-6">
          <img alt="User profile picture" class="rounded-full w-12 h-12 mr-4" height="50" src="https://placehold.co/50x50" width="50"/>
          <div>
            <h2 class="text-lg font-semibold">amanuel</h2>
            <p class="text-sm">amanuel@gmail.com</p>
          </div>
        </div>
        <nav>
          <ul>
            <li class="mb-4">
              <a class="flex items-center" href="#">
                <i class="fas fa-tachometer-alt mr-3"></i>
                Dashboard
              </a>
            </li>
            <li class="mb-4">
              <a class="flex items-center" href="#">
                <i class="fas fa-tasks mr-3"></i>
                Vital Task
              </a>
            </li>
            <li class="mb-4">
              <a class="flex items-center" href="#">
                <i class="fas fa-clipboard-list mr-3"></i>
                My Task
              </a>
            </li>
            <li class="mb-4">
              <a class="flex items-center" href="#">
                <i class="fas fa-list-alt mr-3"></i>
                Task Categories
              </a>
            </li>
            <li class="mb-4">
              <a class="flex items-center" href="#">
                <i class="fas fa-cog mr-3"></i>
                Settings
              </a>
            </li>
            <li class="mb-4">
              <a class="flex items-center" href="#">
                <i class="fas fa-question-circle mr-3"></i>
                Help
              </a>
            </li>
          </ul>
        </nav>
      </div>
      <div>
        <a class="flex items-center" href="#">
          <i class="fas fa-sign-out-alt mr-3"></i>
          Logout
        </a>
      </div>
    </div>
    <!-- Main Content -->
    <div class="flex-1 p-6 ml-64">
      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <div class="text-2xl font-bold text-red-500">To-Do</div>
        <div class="flex items-center">
          <input class="border rounded-full px-4 py-2 mr-4" placeholder="Search your task here..." type="text"/>
          <button class="text-red-500">
            <i class="fas fa-search"></i>
          </button>
          <div class="ml-6 text-gray-500">
            Tuesday
            <br/>
            28/08/2023
          </div>
        </div>
      </div>
      <!-- Account Information -->
      <div class="bg-white p-6 rounded-lg shadow-lg">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold">Account Information</h2>
          <a class="text-gray-500" href="#">Go Back</a>
        </div>
        <div class="flex items-center mb-6">
          <img alt="User profile picture" class="rounded-full w-12 h-12 mr-4" height="50" src="https://placehold.co/50x50" width="50"/>
          <div>
            <h3 class="text-lg font-semibold">amanuel</h3>
            <p class="text-sm text-gray-500">amanuel@gmail.com</p>
          </div>
        </div>
        <form>
          <div class="grid grid-cols-1 gap-4 mb-4">
            <input class="border rounded-lg px-4 py-2" placeholder="First Name" type="text"/>
            <input class="border rounded-lg px-4 py-2" placeholder="Last Name" type="text"/>
            <input class="border rounded-lg px-4 py-2" placeholder="Email Address" type="email"/>
            <input class="border rounded-lg px-4 py-2" placeholder="Contact Number" type="text"/>
            <input class="border rounded-lg px-4 py-2" placeholder="Position" type="text"/>
          </div>
          <div class="flex space-x-4">
            <button class="bg-red-500 text-white px-4 py-2 rounded-lg" type="button">Update Info</button>
            <button class="bg-orange-500 text-white px-4 py-2 rounded-lg" type="button">Change Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
