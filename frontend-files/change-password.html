<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
    Change Password
  </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="bg-black text-white w-64 p-6 fixed h-full">
      <div class="flex items-center mb-6">
        <img alt="User profile picture" class="rounded-full w-12 h-12 mr-4" height="50" src="https://placehold.co/50x50" width="50"/>
        <div>
          <p class="font-bold">
            amanuel
          </p>
          <p class="text-sm">
            amanuel@gmail.com
          </p>
        </div>
      </div>
      <nav class="space-y-4">
        <a class="flex items-center text-gray-400 hover:text-white" href="#">
          <i class="fas fa-tachometer-alt mr-3"></i>
          Dashboard
        </a>
        <a class="flex items-center text-gray-400 hover:text-white" href="#">
          <i class="fas fa-tasks mr-3"></i>
          Vital Task
        </a>
        <a class="flex items-center text-gray-400 hover:text-white" href="#">
          <i class="fas fa-list mr-3"></i>
          My Task
        </a>
        <a class="flex items-center text-gray-400 hover:text-white" href="#">
          <i class="fas fa-th-large mr-3"></i>
          Task Categories
        </a>
        <a class="flex items-center text-gray-400 hover:text-white" href="#">
          <i class="fas fa-cog mr-3"></i>
          Settings
        </a>
        <a class="flex items-center text-gray-400 hover:text-white" href="#">
          <i class="fas fa-question-circle mr-3"></i>
          Help
        </a>
      </nav>
      <div class="mt-auto">
        <a class="flex items-center text-gray-400 hover:text-white" href="#">
          <i class="fas fa-sign-out-alt mr-3"></i>
          Logout
        </a>
      </div>
    </div>
    <!-- Main Content -->
    <div class="flex-1 p-6 ml-64">
      <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-red-500">
          To-Do
        </h1>
        <div class="flex items-center space-x-4">
          <input class="p-2 border rounded" placeholder="Search your task here..." type="text"/>
          <i class="fas fa-search text-red-500"></i>
          <i class="fas fa-bell text-red-500"></i>
          <i class="fas fa-cog text-red-500"></i>
          <p class="text-blue-500">
            Tuesday
            <br/>
            29/08/2023
          </p>
        </div>
      </header>
      <div class="bg-white p-6 rounded-lg shadow-lg">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold text-red-500">
            Change Password
          </h2>
          <a class="text-blue-500" href="#">
            Go Back
          </a>
        </div>
        <div class="flex items-center mb-6">
          <img alt="User profile picture" class="rounded-full w-12 h-12 mr-4" height="50" src="https://placehold.co/50x50" width="50"/>
          <div>
            <p class="font-bold">
              amanuel
            </p>
            <p class="text-sm text-gray-500">
              amanuel@gmail.com
            </p>
          </div>
        </div>
        <form>
          <div class="mb-4">
            <label class="block text-gray-700" for="current-password">
              Current Password
            </label>
            <input class="w-full p-2 border rounded" id="current-password" type="password"/>
          </div>
          <div class="mb-4">
            <label class="block text-gray-700" for="new-password">
              New Password
            </label>
            <input class="w-full p-2 border rounded" id="new-password" type="password"/>
          </div>
          <div class="mb-4">
            <label class="block text-gray-700" for="confirm-password">
              Confirm Password
            </label>
            <input class="w-full p-2 border rounded" id="confirm-password" type="password"/>
          </div>
          <div class="flex space-x-4">
            <button class="bg-red-500 text-white px-4 py-2 rounded" type="submit">
              Update Password
            </button>
            <button class="bg-gray-300 text-black px-4 py-2 rounded" type="button">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
