<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   To-Do App
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Roboto', sans-serif;
        }
  </style>
 </head>
 <body class="bg-gray-100">
  <div class="flex h-screen">
   <!-- Sidebar -->
   <div class="bg-black text-white w-64 p-6 flex flex-col">
    <div class="flex items-center mb-8">
     <img alt="User profile picture" class="rounded-full w-12 h-12 mr-4" height="50" src="https://storage.googleapis.com/a1aa/image/tYi7HaSXS5YD37x64dX6L4jbp7uy2jna9qi07f2wDvI.jpg" width="50"/>
     <div>
      <p class="font-bold">
       amanuel
      </p>
      <p class="text-sm">
       amanuel@gmail.com
      </p>
     </div>
    </div>
    <nav class="flex-1">
     <ul>
      <li class="mb-4">
       <a class="flex items-center text-white" href="#">
        <i class="fas fa-tachometer-alt mr-3">
        </i>
        Dashboard
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center text-white" href="#">
        <i class="fas fa-tasks mr-3">
        </i>
        Vital Task
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center text-white" href="#">
        <i class="fas fa-list mr-3">
        </i>
        My Task
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center text-black bg-white p-2 rounded" href="#">
        <i class="fas fa-list-alt mr-3 text-red-500">
        </i>
        Task Categories
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center text-white" href="#">
        <i class="fas fa-cog mr-3">
        </i>
        Settings
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center text-white" href="#">
        <i class="fas fa-question-circle mr-3">
        </i>
        Help
       </a>
      </li>
     </ul>
    </nav>
    <div>
     <a class="flex items-center text-white" href="#">
      <i class="fas fa-sign-out-alt mr-3">
      </i>
      Logout
     </a>
    </div>
   </div>
   <!-- Main Content -->
   <div class="flex-1 p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
     <div class="flex items-center">
      <h1 class="text-2xl font-bold text-red-500">
       To-Do
      </h1>
     </div>
     <div class="flex items-center">
      <input class="border rounded p-2 mr-4" placeholder="Search your task here..." type="text"/>
      <button class="text-red-500 mr-4">
       <i class="fas fa-search">
       </i>
      </button>
      <button class="text-red-500 mr-4">
       <i class="fas fa-bell">
       </i>
      </button>
      <button class="text-red-500">
       <i class="fas fa-cog">
       </i>
      </button>
     </div>
     <div class="text-sm text-gray-500">
      <p>
       Tuesday
      </p>
      <p>
       20/06/2023
      </p>
     </div>
    </div>
    <!-- Create Categories Form -->
    <div class="bg-white p-6 rounded shadow-md">
     <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">
       Create Categories
      </h2>
      <a class="text-gray-500" href="#">
       Go Back
      </a>
     </div>
     <form>
      <div class="mb-4">
       <label class="block text-gray-700" for="category-name">
        Category Name
       </label>
       <input class="border rounded w-full p-2" id="category-name" type="text"/>
      </div>
      <div class="flex space-x-4">
       <button class="bg-red-500 text-white px-4 py-2 rounded" type="submit">
        Create
       </button>
       <button class="bg-gray-300 text-black px-4 py-2 rounded" type="button">
        Cancel
       </button>
      </div>
     </form>
    </div>
   </div>
  </div>
 </body>
</html>
