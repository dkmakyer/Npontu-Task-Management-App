<html>
 <head>
  <title>
   Dashboard - Edit Task
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
 </head>
 <body class="bg-gray-100">
  <div class="flex h-screen">
   <!-- Sidebar -->
   <div class="bg-black text-white w-64 p-6 fixed h-full">
    <div class="flex items-center mb-8">
     <img alt="User profile picture" class="rounded-full w-12 h-12 mr-4" height="50" src="https://placehold.co/50x50" width="50"/>
     <div>
      <h2 class="text-lg font-semibold">
       Sundar Gurung
      </h2>
      <p class="text-sm">
       sundar.gurung@domain.com
      </p>
     </div>
    </div>
    <nav>
     <ul>
      <li class="mb-4">
       <a class="flex items-center" href="#">
        <i class="fas fa-tachometer-alt mr-2">
        </i>
        Dashboard
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center" href="#">
        <i class="fas fa-heartbeat mr-2">
        </i>
        Vital Task
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center" href="#">
        <i class="fas fa-tasks mr-2">
        </i>
        My Task
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center" href="#">
        <i class="fas fa-list-alt mr-2">
        </i>
        Task Categories
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center" href="#">
        <i class="fas fa-cog mr-2">
        </i>
        Settings
       </a>
      </li>
      <li class="mb-4">
       <a class="flex items-center" href="#">
        <i class="fas fa-question-circle mr-2">
        </i>
        Help
       </a>
      </li>
     </ul>
    </nav>
    <div class="mt-auto">
     <a class="flex items-center text-red-500" href="#">
      <i class="fas fa-sign-out-alt mr-2">
      </i>
      Logout
     </a>
    </div>
   </div>
   <!-- Main Content -->
   <div class="flex-1 p-6 ml-64">
    <div class="flex justify-between items-center mb-6">
     <h1 class="text-2xl font-semibold">
      Dashboard
     </h1>
     <div class="flex items-center">
      <input class="border rounded p-2 mr-4" placeholder="Search your task here..." type="text"/>
      <button class="bg-red-500 text-white px-4 py-2 rounded">
       Invite
      </button>
     </div>
    </div>
    <div class="bg-white p-8 rounded shadow-lg max-w-3xl mx-auto">
     <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-semibold">
       Edit Task
      </h2>
      <a class="text-blue-500" href="#">
       Go Back
      </a>
     </div>
     <form>
      <div class="mb-4">
       <label class="block text-gray-700" for="title">
        Title
       </label>
       <input class="border rounded w-full p-2" id="title" type="text"/>
      </div>
      <div class="mb-4">
       <label class="block text-gray-700" for="date">
        Date
       </label>
       <input class="border rounded w-full p-2" id="date" type="date"/>
      </div>
      <div class="mb-4">
       <label class="block text-gray-700">
        Priority
       </label>
       <div class="flex items-center">
        <input class="mr-2" id="extreme" name="priority" type="radio"/>
        <label class="mr-4" for="extreme">
         Extreme
        </label>
        <input class="mr-2" id="moderate" name="priority" type="radio"/>
        <label class="mr-4" for="moderate">
         Moderate
        </label>
        <input class="mr-2" id="low" name="priority" type="radio"/>
        <label for="low">
         Low
        </label>
       </div>
      </div>
      <div class="mb-4">
       <label class="block text-gray-700" for="description">
        Task Description
       </label>
       <textarea class="border rounded w-full p-2 h-32" id="description">
       </textarea>
      </div>
      <div class="mb-4">
       <label class="block text-gray-700">
        Upload Image
       </label>
       <div class="border-dashed border-2 border-gray-300 rounded p-4 text-center">
        <img alt="Upload image placeholder" class="mx-auto mb-4" height="100" src="https://placehold.co/100x100" width="100"/>
        <p>
         Drag &amp; Drop files here
        </p>
        <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded mt-2">
         Browse
        </button>
       </div>
      </div>
      <div class="text-right">
       <button class="bg-orange-500 text-white px-4 py-2 rounded">
        Done
       </button>
      </div>
     </form>
    </div>
   </div>
  </div>
 </body>
</html>
